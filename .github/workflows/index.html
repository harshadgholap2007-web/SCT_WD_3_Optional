<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Modern Tic-Tac-Toe Game</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);

padding:20px;

}

.container{

width:470px;

max-width:100%;

background:rgba(255,255,255,.12);

backdrop-filter:blur(15px);

border-radius:25px;

padding:30px;

box-shadow:0 20px 40px rgba(0,0,0,.35);

border:1px solid rgba(255,255,255,.15);

color:white;

}

h1{

text-align:center;

margin-bottom:20px;

font-size:34px;

}

.mode{

display:flex;

justify-content:center;

gap:20px;

margin-bottom:20px;

flex-wrap:wrap;

}

.mode label{

cursor:pointer;

font-size:16px;

}

.status{

text-align:center;

font-size:22px;

font-weight:bold;

margin-bottom:20px;

}

.board{

display:grid;

grid-template-columns:repeat(3,1fr);

gap:12px;

margin-bottom:25px;

}

.cell{

height:110px;

background:rgba(255,255,255,.15);

border-radius:15px;

display:flex;

justify-content:center;

align-items:center;

font-size:55px;

font-weight:bold;

cursor:pointer;

transition:.3s;

user-select:none;

}

.cell:hover{

background:rgba(255,255,255,.28);

transform:scale(1.05);

}

.controls{

display:flex;

gap:15px;

margin-bottom:25px;

}

button{

flex:1;

padding:14px;

border:none;

border-radius:12px;

font-size:17px;

font-weight:bold;

cursor:pointer;

transition:.3s;

}

button:hover{

transform:translateY(-3px);

box-shadow:0 8px 15px rgba(0,0,0,.25);

}

#restartBtn{

background:#f59e0b;

color:white;

}

#newGameBtn{

background:#16a34a;

color:white;

}

.scoreboard{

display:grid;

grid-template-columns:repeat(3,1fr);

gap:10px;

text-align:center;

}

.score{

background:rgba(255,255,255,.15);

padding:15px;

border-radius:12px;

}

.score h3{

font-size:18px;

margin-bottom:8px;

}

.score p{

font-size:24px;

font-weight:bold;

}

.win{

background:#22c55e !important;

color:white;

animation:pulse .8s infinite;

}

@keyframes pulse{

0%{

transform:scale(1);

}

50%{

transform:scale(1.08);

}

100%{

transform:scale(1);

}

}

@media(max-width:500px){

.container{

padding:20px;

}

.cell{

height:85px;

font-size:42px;

}

.status{

font-size:18px;

}

button{

font-size:15px;

}

}

</style>

</head>

<body>

<div class="container">

<h1>🎮 Tic Tac Toe</h1>

<div class="mode">

<label>

<input
type="radio"
name="mode"
value="player"
checked>

Player vs Player

</label>

<label>

<input
type="radio"
name="mode"
value="computer">

Player vs Computer

</label>

</div>

<div
class="status"
id="status">

Player X Turn

</div>

<div
class="board"
id="board"><!-- Row 1 -->
<div class="cell" data-index="0"></div>
<div class="cell" data-index="1"></div>
<div class="cell" data-index="2"></div>

<!-- Row 2 -->
<div class="cell" data-index="3"></div>
<div class="cell" data-index="4"></div>
<div class="cell" data-index="5"></div>

<!-- Row 3 -->
<div class="cell" data-index="6"></div>
<div class="cell" data-index="7"></div>
<div class="cell" data-index="8"></div>

</div>

<!-- Controls -->
<div class="controls">

<button id="restartBtn">
🔄 Restart
</button>

<button id="newGameBtn">
🆕 New Game
</button>

</div>

<!-- Scoreboard -->
<div class="scoreboard">

<div class="score">
<h3>Player X</h3>
<p id="scoreX">0</p>
</div>

<div class="score">
<h3>Draw</h3>
<p id="scoreDraw">0</p>
</div>

<div class="score">
<h3>Player O</h3>
<p id="scoreO">0</p>
</div>

</div>

</div>

<script>

// ===============================
// DOM Elements
// ===============================

const board = document.getElementById("board");
const cells = document.querySelectorAll(".cell");

const statusText = document.getElementById("status");

const restartBtn = document.getElementById("restartBtn");
const newGameBtn = document.getElementById("newGameBtn");

const scoreX = document.getElementById("scoreX");
const scoreO = document.getElementById("scoreO");
const scoreDraw = document.getElementById("scoreDraw");

const modeButtons =
document.querySelectorAll('input[name="mode"]');


// ===============================
// Game Variables
// ===============================

let currentPlayer = "X";

let gameActive = true;

let gameMode = "player";

let boardState = [
"",
"",
"",
"",
"",
"",
"",
"",
""
];

let xWins = 0;

let oWins = 0;

let draws = 0;


// Winning Combinations

const winningCombinations = [

[0,1,2],
[3,4,5],
[6,7,8],

[0,3,6],
[1,4,7],
[2,5,8],

[0,4,8],
[2,4,6]

];// =====================================
// Create Cell Click Events
// =====================================

cells.forEach(cell => {

    cell.addEventListener("click", handleCellClick);

});


// =====================================
// Handle Cell Click
// =====================================

function handleCellClick(event){

    const cell = event.target;

    const index = cell.dataset.index;

    // Ignore if game ended or cell already filled
    if(
        boardState[index] !== "" ||
        !gameActive
    ){
        return;
    }

    // Place current player's mark
    boardState[index] = currentPlayer;

    cell.textContent = currentPlayer;

    // Check for winner or draw
    checkWinner();

    // Stop if game finished
    if(!gameActive){
        return;
    }

    // Switch Player
    currentPlayer =
        currentPlayer === "X"
        ? "O"
        : "X";

    statusText.textContent =
        `Player ${currentPlayer} Turn`;

}



// =====================================
// Update Board Display
// =====================================

function updateBoard(){

    cells.forEach((cell,index)=>{

        cell.textContent = boardState[index];

        cell.classList.remove("win");

    });

}



// =====================================
// Mode Selection
// =====================================

modeButtons.forEach(button=>{

    button.addEventListener("change",()=>{

        gameMode = button.value;

        resetBoard();

    });

});



// =====================================
// Reset Board Only
// =====================================

function resetBoard(){

    boardState = [
        "","","",
        "","","",
        "","",""
    ];

    currentPlayer = "X";

    gameActive = true;

    statusText.textContent =
        "Player X Turn";

    updateBoard();

}



// =====================================
// Initialize Game
// =====================================

updateBoard();// =====================================
// Check Winner
// =====================================

function checkWinner() {

    let roundWon = false;

    for (let combination of winningCombinations) {

        const [a, b, c] = combination;

        if (
            boardState[a] !== "" &&
            boardState[a] === boardState[b] &&
            boardState[b] === boardState[c]
        ) {

            roundWon = true;

            // Highlight Winning Cells
            cells[a].classList.add("win");
            cells[b].classList.add("win");
            cells[c].classList.add("win");

            break;
        }

    }

    // Winner Found
    if (roundWon) {

        gameActive = false;

        statusText.textContent =
            `🎉 Player ${currentPlayer} Wins!`;

        // Update Scoreboard
        if (currentPlayer === "X") {

            xWins++;
            scoreX.textContent = xWins;

        } else {

            oWins++;
            scoreO.textContent = oWins;

        }

        return;

    }

    // Draw
    if (!boardState.includes("")) {

        gameActive = false;

        draws++;

        scoreDraw.textContent = draws;

        statusText.textContent =
            "🤝 It's a Draw!";

    }

}



// =====================================
// Restart Current Match
// =====================================

restartBtn.addEventListener("click", () => {

    resetBoard();

});



// =====================================
// New Game
// =====================================

newGameBtn.addEventListener("click", () => {

    // Reset Scores
    xWins = 0;
    oWins = 0;
    draws = 0;

    scoreX.textContent = 0;
    scoreO.textContent = 0;
    scoreDraw.textContent = 0;

    // Reset Board
    resetBoard();

});



// =====================================
// Improve Reset Board
// =====================================

const originalResetBoard = resetBoard;

resetBoard = function () {

    originalResetBoard();

    cells.forEach(cell => {

        cell.classList.remove("win");

    });

};// =====================================
// Computer Move (Basic AI)
// =====================================

function computerMove() {

    if (!gameActive) return;

    // Get all empty cells
    const emptyCells = [];

    boardState.forEach((value, index) => {

        if (value === "") {

            emptyCells.push(index);

        }

    });

    // No moves available
    if (emptyCells.length === 0) return;

    // Choose a random empty cell
    const randomIndex =
        emptyCells[Math.floor(Math.random() * emptyCells.length)];

    boardState[randomIndex] = "O";

    cells[randomIndex].textContent = "O";

    // Check winner after computer move
    checkWinner();

    // Switch back to player if game continues
    if (gameActive) {

        currentPlayer = "X";

        statusText.textContent = "Player X Turn";

    }

}



// =====================================
// Override Click Handler for AI Mode
// =====================================

const originalHandleClick = handleCellClick;

handleCellClick = function(event) {

    // Player move
    originalHandleClick(event);

    // Computer move
    if (
        gameMode === "computer" &&
        gameActive &&
        currentPlayer === "O"
    ) {

        setTimeout(() => {

            computerMove();

        }, 500);

    }

};



// =====================================
// Re-attach Click Events
// =====================================

cells.forEach(cell => {

    cell.removeEventListener("click", originalHandleClick);

    cell.addEventListener("click", handleCellClick);

});



// =====================================
// Update Status on Mode Change
// =====================================

modeButtons.forEach(button => {

    button.addEventListener("change", () => {

        if (button.checked) {

            gameMode = button.value;

            resetBoard();

            if (gameMode === "computer") {

                statusText.textContent =
                    "Player X Turn (vs Computer)";

            }

        }

    });

});// =========================================
// Dark / Light Mode Toggle
// =========================================

const themeBtn = document.createElement("button");

themeBtn.innerHTML = "🌙";
themeBtn.title = "Toggle Theme";

themeBtn.style.position = "fixed";
themeBtn.style.top = "20px";
themeBtn.style.right = "20px";
themeBtn.style.width = "55px";
themeBtn.style.height = "55px";
themeBtn.style.borderRadius = "50%";
themeBtn.style.border = "none";
themeBtn.style.cursor = "pointer";
themeBtn.style.fontSize = "22px";
themeBtn.style.background = "#ffffff";
themeBtn.style.boxShadow = "0 10px 20px rgba(0,0,0,.3)";
themeBtn.style.zIndex = "1000";

document.body.appendChild(themeBtn);

let darkMode = true;

themeBtn.addEventListener("click", () => {

    darkMode = !darkMode;

    if (darkMode) {

        document.body.style.background =
            "linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb)";

        document.querySelector(".container").style.color = "#ffffff";

        themeBtn.innerHTML = "🌙";

    } else {

        document.body.style.background =
            "linear-gradient(135deg,#f8fafc,#dbeafe,#bfdbfe)";

        document.querySelector(".container").style.color = "#111827";

        themeBtn.innerHTML = "☀️";

    }

});


// =========================================
// Confetti Animation
// =========================================

function celebrateWinner() {

    for (let i = 0; i < 80; i++) {

        const confetti = document.createElement("div");

        confetti.style.position = "fixed";
        confetti.style.width = "8px";
        confetti.style.height = "8px";
        confetti.style.borderRadius = "50%";
        confetti.style.left = Math.random() * 100 + "vw";
        confetti.style.top = "-20px";
        confetti.style.background =
            `hsl(${Math.random() * 360},100%,50%)`;

        confetti.style.transition = "3s linear";
        confetti.style.pointerEvents = "none";

        document.body.appendChild(confetti);

        setTimeout(() => {

            confetti.style.transform =
                "translateY(110vh) rotate(720deg)";

        }, 10);

        setTimeout(() => {

            confetti.remove();

        }, 3000);

    }

}



// =========================================
// Show Confetti on Win
// =========================================

const oldCheckWinner = checkWinner;

checkWinner = function () {

    oldCheckWinner();

    if (!gameActive && statusText.textContent.includes("Wins")) {

        celebrateWinner();

    }

};



// =========================================
// Page Load Animation
// =========================================

const container = document.querySelector(".container");

container.style.opacity = "0";
container.style.transform = "translateY(40px)";

setTimeout(() => {

    container.style.transition = ".8s";

    container.style.opacity = "1";

    container.style.transform = "translateY(0)";

}, 100);



// =========================================
// Keyboard Shortcut
// Press R = Restart Board
// Press N = New Game
// =========================================

document.addEventListener("keydown", (event) => {

    if (event.key === "r" || event.key === "R") {

        resetBoard();

    }

    if (event.key === "n" || event.key === "N") {

        newGameBtn.click();

    }

});



// =========================================
// Console Message
// =========================================

console.log("Modern Tic Tac Toe Loaded Successfully!");
